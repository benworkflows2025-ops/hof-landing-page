<style>
html, body { margin: 0 !important; padding: 0 !important; width: 100% !important; max-width: 100% !important; height: 100% !important; overflow: hidden !important; }
.hl_page-creator--content, .hl_page-creator--content > div, .hl-builder, .hl-builder > div, .c-section, .c-wrapper, .c-row, .c-column, .fullSection, .fullSectionWrap, .section, .row-fluid, .full-width-row, .container, .container-fluid, .row, .col, .col-12, .col-md-12, .col-lg-12, .col-sm-12, .col-xs-12, [class*="col-"] { margin-left: 0 !important; margin-right: 0 !important; padding-left: 0 !important; padding-right: 0 !important; max-width: 100% !important; width: 100% !important; }
.hl_page-creator--content, .c-section, .c-wrapper, .fullSection { display: block !important; float: none !important; }
.hof-root { position: relative; width: 100vw; min-height: 100vh; left: 50%; right: 50%; margin-left: -50vw !important; margin-right: -50vw !important; max-width: 100vw !important; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: #fdf8ef; color: #1a1410; line-height: 1.6; }
.hof-root { --cream-50:#fefcf6;--cream-100:#fdf8ef;--cream-200:#dbeeea;--rose-300:#bfe4dd;--rose-400:#80c4ba;--rose-500:#0d5b54;--rose-600:#0a463f;--rose-700:#06302b;--rose-rgb:13,91,84;--ink-400:#7d6b5e;--ink-500:#5a4a3e;--ink-600:#3d3027;--ink-700:#2a201a;--ink-800:#1a1410;--ink-900:#0d0a07;font-family:'DM Sans',system-ui,sans-serif;color:var(--ink-800);line-height:1.6;-webkit-font-smoothing:antialiased;}
.hof-root *, .hof-root *::before, .hof-root *::after { box-sizing: border-box; }
.hof-root img, .hof-root svg { display: block; max-width: 100%; }
.hof-root a { color: inherit; text-decoration: none; }
.hof-root h1, .hof-root h2, .hof-root h3, .hof-root p { margin: 0; }
.hof-root .hof-eyebrow { font-size: 11px; letter-spacing: .32em; text-transform: uppercase; font-weight: 500; }
@keyframes hof-cat-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.hof-root .hof-cat { animation: hof-cat-float 5s ease-in-out infinite; }
@keyframes hof-tail-sway { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-7deg); } }
.hof-root .hof-cat__tail { transform-origin: 205px 215px; animation: hof-tail-sway 3.5s ease-in-out infinite; }
@keyframes hof-q-bob { 0%,100% { transform: translateY(0); opacity: .7; } 50% { transform: translateY(-8px); opacity: 1; } }
.hof-root .hof-cat__q1 { animation: hof-q-bob 2.6s ease-in-out infinite; }
.hof-root .hof-cat__q2 { animation: hof-q-bob 3.1s ease-in-out infinite .4s; }
.hof-root .hof-cat__q3 { animation: hof-q-bob 2.3s ease-in-out infinite .8s; }
@keyframes hof-fade-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
.hof-root .hof-fade { opacity: 0; animation: hof-fade-up .9s cubic-bezier(.16,1,.3,1) forwards; }
.hof-root .hof-fade--d1 { animation-delay: .15s; }
.hof-root .hof-fade--d2 { animation-delay: .3s; }
.hof-root .hof-fade--d3 { animation-delay: .45s; }
.hof-root .hof-fade--d4 { animation-delay: .6s; }

/* ===== 404 LAYOUT ===== */
.hof-root .hof-404 {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse 70% 55% at 50% 50%, rgba(26,132,120,.18) 0%, rgba(250,247,242,0) 60%),
    linear-gradient(180deg, #fefcf6 0%, #fdf8ef 100%);
}
.hof-root .hof-404__inner { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }

/* Brand mark, top-left */
.hof-root .hof-404__brand { position: absolute; top: 24px; left: 24px; display: inline-flex; align-items: center; gap: 10px; }
.hof-root .hof-404__brand svg { width: 28px; height: 28px; }
.hof-root .hof-404__brand-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 14px; color: var(--ink-800); letter-spacing: -.01em; }

/* Cat */
.hof-root .hof-404__cat { width: clamp(220px, 38vh, 360px); height: auto; margin-bottom: clamp(16px, 3vh, 28px); }

.hof-root .hof-404__eyebrow { color: var(--rose-500); margin-bottom: 10px; }
.hof-root .hof-404__code { font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(64px, 12vh, 110px); line-height: 1; letter-spacing: -.04em; color: var(--ink-900); margin-bottom: 6px; }
.hof-root .hof-404__code em { font-style: italic; color: var(--rose-500); font-weight: 500; }
.hof-root .hof-404__title { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--ink-900); font-size: clamp(22px, 3.6vh, 32px); line-height: 1.15; letter-spacing: -.02em; margin-bottom: 12px; }
.hof-root .hof-404__title em { font-style: italic; color: var(--rose-500); font-weight: 500; }
.hof-root .hof-404__sub { color: var(--ink-500); font-size: 15px; line-height: 1.55; max-width: 420px; margin: 0 auto clamp(20px, 3.5vh, 32px); }

.hof-root .hof-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; border-radius: 9999px; padding: 14px 36px; font-size: 16px; line-height: 1; cursor: pointer; transition: background .3s, color .3s, transform .3s, box-shadow .3s; white-space: nowrap; background: var(--rose-500); color: var(--cream-50); box-shadow: 0 10px 25px -8px rgba(var(--rose-rgb),.35); position: relative; overflow: hidden; isolation: isolate; }
.hof-root .hof-btn:hover { background: var(--rose-600); transform: translateY(-1px); box-shadow: 0 14px 30px -8px rgba(var(--rose-rgb),.45); }
.hof-root .hof-btn .hof-i { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.hof-root .hof-btn::after { content: ''; position: absolute; top: 0; left: -130%; width: 70%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent); transform: skewX(-22deg); transition: left .8s ease; z-index: -1; }
.hof-root .hof-btn:hover::after { left: 130%; }

@media (max-height: 600px) {
  .hof-root .hof-404__cat { width: clamp(180px, 32vh, 240px); margin-bottom: 12px; }
  .hof-root .hof-404__sub { display: none; }
}
</style>

did not quite fit together. Certain interactions needed to remain private he didn’t want me talking casually about us. Pictures from our outings were discouraged and definitely not able to be made public, shown or on social media. He said he was very “private.” Our outings were not private just outside the circle of our shared community. Questions were redirected. The explanations sounded reasonable in the moment, but the overall pattern never fully settled. Eventually I learned something that has remained with me ever since: privacy and secrecy are not the same thing."}, {"t": "p", "x": "Healthy people value privacy because privacy protects dignity. Unhealthy situations often depend upon secrecy because secrecy protects deception. He displayed boyfriend and husband-like behavior but referred to each of us as “friends.” He could not and would not ever provide clarity on what the extent of friendships is. Calling us “friends” simply meant I will be good to you and reap the benefits of relationship without the commitment, responsibility or accountability attached to a relationship. However, he expected commitment from both of us while remaining committed to neither. He was very jealous of any interactions with other men even casually or platonically."}, {"t": "p", "x": "In public, he pretended to be casual friends but in private he acted like her attentive boyfriend or my caring husband yet flirted with those who could potentially be fresh supply. I remember once we attended an event, he insisted on us taking separate vehicles to the same event. He also insisted I arrive first and he arrived fashionably later. When he arrived, he asked me to give him a hug and asked, “how have you been?” as if we didn’t spend every single day together and just see each other an hour before the event. To others we were casual friends who had not had contact in a while. In reality, we spent time together every day."}, {"t": "p", "x": "Looking back, the signs of untrustworthiness were present much earlier than I wanted to admit. The problem was not a lack of information. The problem was that attraction, attention, hope, and potential were speaking louder than wisdom. He treated me better than most men I had dated, yet he was still untrustworthy. The lies and deception eventually became impossible to ignore. One of the hardest lessons I learned was realizing that people can be kind, generous, charming, attentive, and still be untrustworthy. Those are great qualities but trustworthiness is the most valuable. Trustworthiness is revealed through consistency."}, {"t": "p", "x": "Eventually I had to confront another difficult truth. He only had access to what I allowed him access to. That realization forced me to stop focusing entirely on his decisions and begin examining my own. I had ignored warning signs. I had rationalized behavior that should have concerned me. I had allowed attraction to move faster than trust. The consequences of those choices did not disappear overnight."}, {"t": "h2", "x": "Respecting Your Own Boundaries"}, {"t": "p", "x": "That experience reinforced a lesson I now take very seriously. If spending time with me must remain a secret, something is wrong. If a relationship can only survive in the shadows, something is wrong. If honesty threatens the relationship, something is wrong. I have no interest in being someone's secret. I have no interest in occupying a place in someone's life that cannot withstand the truth, mutual respect and transparency. Now that I genuinely love myself, I refuse to repeat this hard lesson."}, {"t": "p", "x": "Today I understand that secrecy is information, and information should never be ignored."}, {"t": "p", "x": "That experience also taught me that boundaries do not only need protection from other people. Sometimes they need protection from us. Many people assume the greatest danger is someone pressuring them to abandon their boundaries. Sometimes that happens. Other times the other person is actually respecting the boundary while we begin negotiating against ourselves. We cross or remove our own boundaries. We convince ourselves that the relationship is different. We tell ourselves trust has already been earned. We persuade ourselves that the future we are imagining justifies moving faster than wisdom recommends. Little by little, we begin moving the line we once said was important."}, {"t": "p", "x": "When we repeatedly abandon our own boundaries, we slowly teach ourselves that our values, convictions, and promises are negotiable whenever strong emotions appear. One of the greatest forms of self-respect is honoring the boundaries we established when we were thinking clearly."}, {"t": "p", "x": "Healthy boundaries are not only about limiting access. They are also about preserving freedom. They preserve the freedom to think clearly, evaluate honestly, make decisions without unnecessary pressure, and leave when new information reveals that a relationship should not continue progressing."}, {"t": "p", "x": "This is one reason I believe observation and commitment are not the same thing. Many people unknowingly create commitment in their minds long before commitment exists in reality. They begin making emotional decisions based on a future that has never been discussed, agreed upon, or established. Then they become hurt, angry, jealous, or resentful when the other person behaves consistently with the relationship that actually exists rather than the relationship they imagined. Part of emotional maturity is allowing reality to be reality."}, {"t": "p", "x": "If exclusivity has not been discussed and mutually agreed upon, exclusivity should not be assumed. If commitment has not been established, commitment should not be expected. That does not mean abandoning boundaries. It means remaining honest about what stage the relationship is actually in."}, {"t": "h2", "x": "Safety Is Wisdom"}, {"t": "p", "x": "Sometimes what feels like a loss is actually protection."}, {"t": "p", "x": "One of the most practical forms of wisdom is preserving your ability to make decisions. Early in relationships, meeting in public places is often wise. Separate transportation is often wise. Protecting personal information is often wise. Avoiding access to your home, routines, favorite locations, financial information, children, family members, and private spaces is often wise. This is not fear. It is stewardship. Everyone does not respond the same when a relationship is relocated or a decision is made not to move forward as intended. Remember others have a story as well and you have no idea what that story really is at the time you are decision-making."}, {"t": "p", "x": "When we allow someone into our lives, we are rarely exposing only ourselves. We may also be exposing our children, family members, friends, coworkers, places of worship, favorite establishments, and others within our sphere of influence. Safety, peace of mind, emotional stability, trust, joy, and freedom are treasures many people underestimate until they lose them."}, {"t": "p", "x": "One of the most revealing moments in any relationship is discovering how someone responds to a boundary. Healthy people do not merely establish boundaries; they honor them. They may not fully understand your boundary. They may not agree with it. They may not have chosen the same boundary for themselves. Yet they respect it because they respect you."}, {"t": "p", "x": "By contrast, unhealthy people often see boundaries as obstacles to overcome. When someone repeatedly pushes a clearly communicated boundary and later says, \"I was just testing you,\" that response should not be ignored. A healthy person does not need to test whether your boundary is real. A healthy person simply respects it. The desire to override, challenge, or repeatedly push against a boundary often reveals something much deeper than the boundary itself."}, {"t": "p", "x": "Healthy relationships are not built on pressure. They are built on mutual respect. They create room for honesty, individuality, growth, and respectful disagreement. They do not require one person to surrender their identity so another person can remain comfortable. Both people are allowed to be fully human, fully imperfect, and still worthy of dignity and respect."}, {"t": "p", "x": "The goal is not to become suspicious of everyone. The goal is wisdom. The goal is learning how to navigate people without losing yourself. The goal is learning how to love others while also stewarding your heart. Guarding your heart does not mean building walls around it. It means learning how to open it wisely."}, {"t": "h1", "x": "Chapter 9"}, {"t": "h2", "x": "What Changes When You Change"}, {"t": "p", "x": "One of the most surprising things about healing is that the changes often become visible long before we realize they are happening. When people first begin a healing journey, they are usually focused on the obvious work in front of them. They are examining wounds, confronting unhealthy patterns, establishing boundaries, learning new ways of thinking, and making difficult decisions. Their attention is directed toward what needs to be repaired. What they often do not realize is that healing gradually changes the lens through which they see everything else."}, {"t": "p", "x": "For a long time, I assumed healing would primarily change how I felt. I thought it would bring greater peace, less emotional pain, and perhaps a stronger sense of confidence. While those things certainly happened, I eventually realized that healing was influencing far more than my emotions. It was changing my perspective."}, {"t": "p", "x": "The first changes were subtle. Situations that once seemed normal began feeling different. Conversations that once felt harmless began revealing patterns I had previously overlooked. Certain behaviors that I once excused or minimized became more difficult to ignore. At first I thought other people were changing. In reality, I was changing. The situations themselves often remained exactly the same. What had changed was my ability to see them more clearly."}, {"t": "p", "x": "One of the things I noticed was that healthy relationships became easier to recognize. For years, I had paid attention to many of the things people commonly admire. I noticed confidence, intelligence, attractiveness, success, charisma, talent, and potential. There is nothing inherently wrong with appreciating those qualities. Over time, however, I found myself paying closer attention to different things. I became more interested in how people handled disappointment, whether their actions matched their words, how they treated people who could do nothing for them, and whether they accepted responsibility for their choices. Character gradually became more important to me than image."}, {"t": "p", "x": "At the same time, unhealthy patterns became easier to identify. I do not mean that every situation became obvious or that discernment suddenly became effortless. Human beings are complicated, and relationships often require patience and observation. What changed was that I became less willing to explain away things that consistently contradicted healthy behavior. Manipulation, dishonesty, blame shifting, chronic irresponsibility, and emotional instability no longer felt like things I needed to tolerate in order to preserve a relationship. Healing had not made me perfect, but it had made me more aware."}, {"t": "p", "x": "That awareness affected more than relationships. It changed how I responded to conflict. There was a time when I felt compelled to explain myself to everyone. If someone misunderstood me, I wanted to correct the misunderstanding. If someone disagreed with my decisions, I wanted them to understand my reasoning. If someone questioned my choices, I often felt responsible for helping them see things from my perspective."}, {"t": "p", "x": "Over time, that began to change."}, {"t": "p", "x": "I realized that understanding and agreement are not the same thing. People are allowed to see life differently. They are allowed to make different choices. They are allowed to disagree. The healthier I became, the less energy I spent trying to secure approval from people who were never responsible for directing my life in the first place. That realization brought a level of freedom I had not experienced before. It allowed me to make decisions based on conviction rather than consensus."}, {"t": "p", "x": "Another change involved the way I viewed responsibility. For much of my life, caring deeply about people often felt connected to helping them solve their problems. If someone was hurting, I wanted to help. If someone was struggling, I wanted to offer solutions. If someone was headed toward consequences, I wanted to warn them before they arrived."}, {"t": "p", "x": "There is certainly a place for compassion, support, and wise counsel. Yet I eventually learned that caring about someone and carrying someone are not the same thing. One of the most difficult lessons of maturity is recognizing that every person is responsible for participating in their own growth. We can encourage people, pray for them, support them, and love them. What we cannot do is make their decisions for them."}, {"t": "p", "x": "That realization changed several relationships in my life. There were people I genuinely loved and wanted the best for. Some were making decisions I would not have chosen. Others were repeating patterns that were causing pain. In earlier seasons of my life, I might have invested enormous energy trying to redirect them. Eventually I learned that growth cannot be forced. People often have to walk their own paths, learn their own lessons, and arrive at their own conclusions."}, {"t": "p", "x": "That understanding did not reduce my compassion. If anything, it deepened it. I learned that prayer can sometimes accomplish more than control ever could. I learned that forgiveness can exist without interference. I learned that love does not require me to assume responsibility for another person's choices."}, {"t": "p", "x": "As healing continued, I also noticed that some relationships naturally changed. This was not always dramatic. In fact, most of the time it was not. Certain people simply occupied different places in my life than they once had. Some relationships became stronger. Others became more distant. A few quietly reached the end of their natural season. None of those outcomes automatically meant someone had failed or that the relationship had been a mistake."}, {"t": "p", "x": "One of the gifts of maturity is recognizing that relationships can change without becoming enemies. Some people remain part of our story without remaining part of our daily lives. Some continue as friends while no longer occupying our inner circle. Others become people we appreciate from a distance. Accepting those transitions became easier once I stopped measuring the health of a relationship solely by its proximity."}, {"t": "p", "x": "Looking back, I can see that healing changed far more than my circumstances. It changed what I valued. It changed what I pursued. It changed what I overlooked and what I paid attention to. It changed how I viewed relationships, responsibility, conflict, approval, and peace. Most importantly, it changed how I saw myself."}, {"t": "p", "x": "None of those changes happened overnight. They developed slowly, often so gradually that I barely noticed them while they were occurring. Yet one day I realized that I was responding differently than I once would have. I was making different decisions. I was noticing different things. I was drawn toward different qualities in people. The work that had been taking place internally was quietly influencing every area of my life."}, {"t": "p", "x": "That is often how healing works. It begins beneath the surface where no one else can see it. Then, over time, the changes begin appearing in the way we think, the choices we make, the relationships we build, and the lives we create. Eventually we realize that healing was never only about recovering from what happened to us. It was also about becoming someone capable of living differently because of what we learned along the way."}, {"t": "h1", "x": "Chapter 10"}, {"t": "h2", "x": "Living From Healing"}, {"t": "p", "x": "When I first began this journey, I assumed healing would feel like arriving somewhere. I imagined there would come a day when the work was finished, the difficult memories no longer surfaced, and life finally settled into a permanent state of peace. Looking back, I realize I was searching for a finish line that did not exist."}, {"t": "p", "x": "What I discovered instead was that healing gradually became part of the way I lived. There was no single moment when everything changed. The changes appeared quietly over time. Situations that once overwhelmed me no longer carried the same power. Decisions that once felt confusing became easier to navigate. Things that had occupied enormous amounts of emotional space slowly lost their grip. Somewhere along the way, I stopped measuring life by what was wrong and started paying attention to what was growing."}, {"t": "p", "x": "One of the first places I noticed that growth was in how I viewed responsibility. For years I believed that caring about people meant helping them whenever I could. If someone was struggling, I wanted to help. If someone was hurting, I wanted to make things better. If someone found themselves facing the consequences of poor decisions, I often felt compelled to step in and lessen the impact."}, {"t": "p", "x": "With time, I began seeing a distinction I had not fully understood before. There is a difference between supporting people and carrying responsibilities that belong to them. Life has a way of teaching that lesson repeatedly. Some hardships arrive without warning and through no fault of our own. Illness, loss, and unexpected setbacks can alter the course of a person's life in ways they never anticipated. In those moments, helping someone can be an expression of compassion and community."}, {"t": "p", "x": "Other situations are different. Sometimes people repeatedly avoid responsibilities, postpone difficult decisions, or continue patterns that create the same problems over and over again. For years I struggled with where compassion ended and wisdom began. Eventually I realized that constantly rescuing people from consequences can unintentionally prevent them from learning the lessons those consequences were designed to teach."}, {"t": "p", "x": "That realization influenced many areas of my life, including my finances. One decision I made years ago was that I would not co-sign for anyone. Some people may view that differently, and that is perfectly fine. For me, it became a stewardship decision rather than a financial one. If a lender was unwilling to assume the risk without my name attached, I learned to pay attention to that information. If payments were not made, the obligation would not disappear. It would simply become mine."}, {"t": "p", "x": "The older I became, the more I understood that stewardship involves more than building stability. It also involves protecting it. I had spent years working toward greater peace, greater responsibility, and greater alignment between my values and my decisions. Healing taught me that wisdom deserves a voice in those decisions as well. Sometimes the healthiest answer is not yes. Sometimes the healthiest answer is simply no."}, {"t": "p", "x": "No is a complete sentence. No does not require further explanation."}, {"t": "p", "x": "Another lesson arrived through growth itself. I expected becoming healthier to make relationships easier. In some cases it did. Many people celebrated the changes they saw in me and encouraged the progress I was making. Others seemed uncomfortable with it, and for a long time I did not understand why."}, {"t": "p", "x": "Eventually I realized that growth changes familiar patterns. People become accustomed to a certain version of us. They learn how we respond to pressure, handle conflict, spend money, make decisions, and navigate life. When those patterns begin changing, the people around us often have to adjust as well. What once felt predictable to them about us becomes unfamiliar."}, {"t": "p", "x": "There was a season when I spent a great deal of energy trying to help people understand my decisions. I wanted them to see what I saw. I wanted them to understand why I had changed. Over time, I learned that understanding and agreement are not the same thing. People are free to see life differently. They are free to disagree. They are free to make choices I would not make for myself. They are also free to live with their decisions without involving me."}, {"t": "p", "x": "That realization brought an unexpected sense of freedom. I no longer felt responsible for managing every opinion, correcting every misunderstanding, or defending every healthy choice. My responsibility was not to gain universal approval. My responsibility was to live faithfully according to the wisdom I had gained along the way. Some people remained close. Some drifted naturally into different places within my life. Others became people I genuinely cared about but no longer shared the same level of access, trust, or influence."}, {"t": "p", "x": "What surprised me was that distance did not require bitterness. In many cases, it created space for peace. I could pray for people, wish them well, and hope the best for their future without feeling obligated to carry burdens that were never mine to carry. I learned that forgiveness does not require access and that caring about someone does not obligate me to assume responsibility for their choices. I began to notice that healing and better decision-making created opportunities, resources, connections, and freedoms I had not previously experienced. Those freedoms were not free. They were the result of years of difficult decisions, consistency, sacrifice, and growth. Others began viewing my freedoms as something “they” should benefit from. Not me. Them."}, {"t": "p", "x": "As life settled into a healthier rhythm, I became aware of changes that had very little to do with anyone else. I discovered how much I enjoyed my own life."}, {"t": "p", "x": "For years I had been so focused on responsibilities, challenges, goals, and obligations that I often missed what was happening around me. As healing continued, I found myself noticing beauty more often. I appreciated ordinary moments in ways I never had before. A quiet morning, a meaningful conversation, a walk outside, a moment of laughter, or simply sitting in peace carried a significance I might have overlooked in earlier seasons of life. In that quiet, I learned something that would have surprised an earlier version of myself: I genuinely enjoyed my own company."}, {"t": "p", "x": "That realization changed more than I expected. I stopped spending so much energy trying to prove who I was. Like most people, I wanted to be respected, valued, appreciated, and understood. There is nothing wrong with those desires. The problem comes when our worth becomes dependent upon receiving them. As healing matured, I found myself less concerned with managing perceptions and more concerned with becoming the person I believed God was shaping me to be."}, {"t": "p", "x": "The freedom that came with that shift is difficult to describe. I spent less time performing and more time living. Less time proving and more time growing. Less time worrying about how I appeared and more time paying attention to who I was becoming."}, {"t": "p", "x": "Looking back now, I realize that many of the things I thought I wanted were pointing toward something deeper. I believed I wanted less stress, fewer problems, better circumstances, stronger relationships, and greater confidence. While all of those things have value, what I was really searching for was wholeness. I wanted my inner life and outer life to move in the same direction. I wanted my decisions, values, beliefs, and actions to become more aligned."}, {"t": "p", "x": "That is what healing slowly began producing."}, {"t": "p", "x": "The older I become, the more convinced I am that healing is less about fixing everything that is broken and more about learning how to live fully despite the places where life has left its marks. We all carry scars. We all carry stories. We all carry experiences that shaped us in ways we did not choose. Healing does not erase those realities. It teaches us how to move forward without allowing them to define us."}, {"t": "p", "x": "Somewhere along the way, I came alive. It happened so gradually that I almost missed it. I found myself laughing more, noticing more, appreciating more, and becoming more grateful for the life that was already in front of me. I stopped postponing joy until circumstances improved. I stopped waiting for a future version of life before allowing myself to live fully in the present one. What I had spent years searching for was not waiting somewhere down the road. Much of it was already unfolding around me. I simply needed to become present enough to experience it."}, {"t": "p", "x": "Life never stopped moving. New challenges appeared. New lessons arrived. Some seasons were easier than others. There were still mistakes, disappointments, and moments that required adjustment. What changed was my relationship with those realities. They no longer convinced me that something was wrong simply because they existed. They became part of the ongoing experience of living, growing, learning, and becoming."}, {"t": "p", "x": "Perhaps that is what healing was teaching me all along. Not how to arrive somewhere, but how to live well while continuing the journey."}, {"t": "h1", "x": "Conclusion"}, {"t": "h2", "x": "The Journey Continues"}, {"t": "p", "x": "If you have made it this far, thank you for allowing me to walk with you through these pages."}, {"t": "p", "x": "There will still be challenges ahead. There will still be days when old memories surface or seasons when progress feels slower than you would like. There may be moments when you wonder whether the effort is making a difference at all. In those moments, remember that healing is rarely measured by the absence of struggle. More often, it reveals itself in the way we respond to struggles that once controlled us."}, {"t": "p", "x": "As the years pass, you may also notice something else. The healthier you become, the more you will appreciate people who value growth, honesty, wisdom, humility, and accountability. Not because they are perfect, but because they are committed to growing as well. I have always appreciated the wisdom found in Proverbs 27:17: \"As iron sharpens iron, so one person sharpens another.\" Healthy relationships often work that way. They encourage growth, provide perspective, offer support during difficult seasons, and remind us that we do not have to walk every road alone."}, {"t": "p", "x": "Some relationships from earlier seasons may remain exactly where they are. Others may take a different seat in your life. A few may come to an end altogether. That does not always mean something failed. Sometimes it simply means the relationship served its purpose for that particular season. Life has a way of bringing people into our path when we need them and, at times, allowing those paths to separate when the season has changed."}, {"t": "p", "x": "As you continue growing, people will notice. Some may become curious about the changes they see in you. Others may find encouragement simply by observing your life. Your growth, lived out in ordinary ways, may become the example someone else needs to see in order to believe that change is possible for them as well. What matters is remembering that their journey belongs to them just as your journey belongs to you. God is fully capable of reaching people without your assistance. Your responsibility is not to pull people through their healing. Your responsibility is to continue doing your own work, continue growing, continue learning, and continue becoming."}, {"t": "p", "x": "I have always loved Jesus' words to Peter in Luke 22:32: \"And when you have turned back, strengthen your brothers.\" What stands out to me is that Jesus knew Peter would struggle. He knew Peter would fail. He knew Peter would experience weakness, fear, and regret. Yet Jesus also knew Peter's story would not end there."}, {"t": "p", "x": "That truth has become deeply meaningful to me because it reminds me that restoration was always part of the story. The same God who continued working in Peter is still working in us. None of us become wise, mature, healthy, or whole overnight. Growth takes time. Healing takes time. Change takes time. Yet God has never been intimidated by process."}, {"t": "p", "x": "One of the beautiful things about healing is that it rarely stops with us. As we become healthier, we often create space for healthier conversations, healthier relationships, and healthier environments around us. Sometimes people notice changes in us before we notice them ourselves. Sometimes our lives become evidence that change is possible. Not because we have mastered everything, but because we chose to keep going."}, {"t": "p", "x": "As I close this book, I find myself thinking less about where you are today and more about where your journey may lead. My hope is not that you remember every story, lesson, or principle from these pages. My hope is that you continue doing the work. I hope you keep choosing honesty when it would be easier to avoid it, growth when it would be easier to stay comfortable, and wisdom when emotion tries to take the lead. Most of all, I hope you continue becoming the person God created you to be."}, {"t": "p", "x": "There is still a beautiful life to live out today and also life ahead of you, along with lessons to learn, relationships to enjoy, memories to create, opportunities to grow, reasons to hope, and experiences waiting to shape you in ways you cannot yet imagine."}, {"t": "p", "x": "If there is one thing I hope you remember from these pages, it is this: you are not too old, too damaged, too broken, or too far gone. The work is worth it. The healing is worth it. The rebuilding is worth it."}, {"t": "p", "x": "Most importantly, your story is not over."}, {"t": "p", "x": "The journey continues."}, {"t": "h2", "x": "Key Terms & Definitions"}, {"t": "h2", "x": "Accountability"}, {"t": "p", "x": "Accountability is the willingness to take ownership of our actions, decisions, and responsibilities. It means refusing to blame everyone else for where we are while remaining honest about where we need to grow. Accountability is not punishment. It is one of the pathways to maturity."}, {"t": "h2", "x": "Boundaries"}, {"t": "p", "x": "Boundaries are healthy limits that protect our well-being, responsibilities, values, and peace. They help define what we will and will not accept in our lives. Healthy boundaries are not walls designed to keep people out. They are guidelines that help relationships function in healthy ways."}, {"t": "h2", "x": "Boundary Violations"}, {"t": "p", "x": "Boundary violations occur when a person repeatedly ignores, challenges, manipulates, pressures, or overrides clearly established limits. Healthy relationships respect boundaries. Unhealthy relationships often test, minimize, or disregard them."}, {"t": "h2", "x": "Codependency"}, {"t": "p", "x": "Codependency occurs when a person's identity, worth, or emotional stability becomes excessively tied to another person's choices, problems, or approval. It often leads people to take responsibility for situations that do not belong to them while neglecting their own needs and growth."}, {"t": "h2", "x": "Compassion"}, {"t": "p", "x": "Compassion is the ability to recognize another person's pain and respond with care, empathy, and concern. Compassion seeks to help when appropriate, but it does not require us to abandon wisdom, boundaries, or personal responsibility."}, {"t": "h2", "x": "Discernment"}, {"t": "p", "x": "Discernment is the ability to recognize the difference between what is healthy and unhealthy, wise and unwise, helpful and harmful. It grows through experience, maturity, wisdom, and spiritual growth."}, {"t": "h2", "x": "Emotional Maturity"}, {"t": "p", "x": "Emotional maturity is the ability to manage emotions without allowing them to control every decision. It includes self-awareness, responsibility, humility, patience, honesty, and the ability to respond thoughtfully rather than react impulsively."}, {"t": "h2", "x": "Faith"}, {"t": "p", "x": "Faith is trusting God even when we cannot see the entire path ahead. It is confidence in God's character, wisdom, and ability to work in our lives despite uncertainty, difficulty, or delay."}, {"t": "h2", "x": "Forgiveness"}, {"t": "p", "x": "Forgiveness is the decision to release resentment, bitterness, and the desire for revenge. Forgiveness does not excuse harmful behavior, erase consequences, or automatically restore trust. It simply frees our hearts from carrying burdens that were never meant to define our future."}, {"t": "h2", "x": "Grace"}, {"t": "p", "x": "Grace is God's undeserved favor, love, and kindness toward us. It reminds us that growth is often a process and that our mistakes do not have the final word in our story. We have the grace of God daily. Sometimes we need to also give ourselves grace – be kind to yourself."}, {"t": "h2", "x": "Guarding Your Heart"}, {"t": "p", "x": "Guarding your heart means paying attention to what influences your thoughts, beliefs, emotions, values, and decisions. It involves protecting your inner life while remaining open to healthy relationships, growth, and God's work within you."}, {"t": "h2", "x": "Healing"}, {"t": "p", "x": "Healing is the ongoing process of addressing wounds, unhealthy patterns, distorted beliefs, and unresolved pain so that they no longer control our lives. Healing is rarely instantaneous. It often happens gradually through honesty, growth, wisdom, and intentional choices."}, {"t": "h2", "x": "Healthy Relationships"}, {"t": "p", "x": "Healthy relationships are built on trust, respect, honesty, accountability, communication, and mutual responsibility. They encourage growth rather than control and support rather than manipulation."}, {"t": "h2", "x": "Identity"}, {"t": "p", "x": "Identity is our understanding of who we are. A healthy identity is not built solely on achievements, failures, relationships, careers, appearance, or the opinions of others. It is rooted in understanding our value, purpose, and worth."}, {"t": "h2", "x": "Internal Agreement"}, {"t": "p", "x": "Internal agreement occurs when we repeatedly accept, believe, or reinforce ideas about ourselves that influence how we live. Healthy internal agreement aligns with truth. Unhealthy internal agreement often reinforces fear, shame, insecurity, or limiting beliefs."}, {"t": "h2", "x": "Peace"}, {"t": "p", "x": "Peace is not the absence of problems. It is the ability to remain grounded, stable, and centered despite life's challenges. Peace grows when our thoughts, choices, values, and actions become increasingly aligned."}, {"t": "h2", "x": "Personal Responsibility"}, {"t": "p", "x": "Personal responsibility is recognizing that while we may not control everything that happens to us, we are responsible for how we respond. It involves taking ownership of our decisions, growth, healing, and future."}, {"t": "h2", "x": "Resilience"}, {"t": "p", "x": "Resilience is the ability to recover, adapt, and continue moving forward after difficulties, disappointments, failures, or setbacks. Resilience does not mean life never hurts. It means pain does not have the final word."}, {"t": "h2", "x": "Restoration"}, {"t": "p", "x": "Restoration is the process of rebuilding what has been damaged, broken, neglected, or lost. It involves healing, growth, wisdom, and intentional effort. Restoration does not always return things to their original form, but it often produces something stronger and healthier."}, {"t": "h2", "x": "Self-Examination"}, {"t": "p", "x": "Self-examination is the practice of honestly evaluating our thoughts, behaviors, motivations, beliefs, relationships, and decisions. It requires humility and creates opportunities for growth and change."}, {"t": "h2", "x": "Shame"}, {"t": "p", "x": "Shame is the belief that our failures, mistakes, wounds, or weaknesses define our value as a person. Unlike healthy conviction, which points toward growth, shame convinces us that change is impossible and that we are fundamentally defective."}, {"t": "h2", "x": "Stewardship"}, {"t": "p", "x": "Stewardship is the responsible management of what has been entrusted to us. This includes our time, finances, relationships, health, opportunities, influence, gifts, and responsibilities. Good stewardship focuses not only on building but also on protecting and wisely managing what we have been given."}, {"t": "h2", "x": "Survival Mode"}, {"t": "p", "x": "Survival mode is a state in which a person becomes focused primarily on getting through the next challenge, crisis, or day. While survival may be necessary during difficult seasons, remaining there indefinitely can prevent growth, healing, and deeper fulfillment."}, {"t": "h2", "x": "Trustworthiness"}, {"t": "p", "x": "Trustworthiness is the consistent demonstration of honesty, integrity, reliability, accountability, and responsible behavior over time. Trustworthiness is not determined by charisma, attraction, intelligence, or potential. It is revealed through patterns of behavior."}, {"t": "h2", "x": "Wholeness"}, {"t": "p", "x": "Wholeness is the condition of living with increasing alignment between our values, beliefs, thoughts, actions, and relationships. It does not mean perfection. It reflects a life that is becoming increasingly healthy, integrated, and authentic."}, {"t": "h2", "x": "Wisdom"}, {"t": "p", "x": "Wisdom is the ability to apply truth, knowledge, experience, and discernment in practical ways. Wisdom helps us make decisions that support long-term growth, health, and well-being rather than short-term comfort or impulse."}, {"t": "h1", "x": "About the Author"}, {"t": "p", "x": "If you've made it this far, thank you for spending some time with me."}, {"t": "p", "x": "Writing this book was not something I planned years ago. In many ways, it grew out of my own journey of trying to understand life, make sense of experiences, recover from poor decisions, heal from painful ones, and learn how to move forward without allowing my past to define my future."}, {"t": "p", "x": "Like many people, I have experienced seasons I would gladly have skipped. I have made mistakes, trusted the wrong people, ignored wisdom, learned lessons the hard way, and found myself wishing for a do-over more than once. Over time, I discovered that while life rarely gives us the opportunity to start over, it often gives us opportunities to begin again."}, {"t": "p", "x": "That realization changed me."}, {"t": "p", "x": "Although I have been blessed to pursue advanced education and earn multiple degrees, some of the greatest lessons I have learned did not come from classrooms, textbooks, titles, positions, or accomplishments. They came from life. They came from disappointment, healing, rebuilding, growth, and learning how to become honest with myself. They came from discovering that restoration is often a process rather than an event."}, {"t": "p", "x": "I am still learning, still growing, and still working through layers. That is one of the reasons I wrote this book. Not because I have everything figured out, but because I know what it feels like to need hope, wisdom, practical direction, and the reassurance that change is possible."}, {"t": "p", "x": "My prayer is that something within these pages helped you see yourself differently, think differently, or believe differently about what is possible for your future."}, {"t": "p", "x": "Thank you for allowing me to be part of your journey for a little while. I wish you healing, growth, wisdom, peace, and many opportunities to begin again."}, {"t": "h2", "x": "— LaNita D. Butler"}, {"t": "p", "x": "The journey continues."}, {"t": "h2", "x": "Stay Connected"}, {"t": "p", "x": "Thank you for reading Guard Your Heart."}, {"t": "p", "x": "If this book encouraged you, I invite you to stay connected for future resources, teachings, devotionals, courses, and transformational content focused on healing, restoration, wisdom, leadership, emotional maturity, and spiritual growth."}, {"t": "p", "x": "Website:"}, {"t": "h2", "x": "heartsonfiretv.com"}, {"t": "p", "x": "Email:"}, {"t": "h2", "x": "info@heartsonfiretv.com"}]};</script>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
(function(){
  var BOOK=window.BOOK, bookEl=document.getElementById('book'), loadEl=document.getElementById('load');
  var indEl=document.getElementById('ind'), tocList=document.getElementById('tocList'), tocEl=document.getElementById('toc');
  document.getElementById('bktitle').textContent=BOOK.title+' · '+BOOK.author;
  var flip=null, chapters=[], totalFlip=0, api=null, curIndex=0;

  function size(){
    var vw=innerWidth, vh=innerHeight, availH=vh-120, portrait=vw<820, PW;
    if(portrait) PW=Math.min(vw*0.93, availH*0.66, 470);
    else PW=Math.min(vw*0.45, availH*0.66, 560);
    PW=Math.max(PW,260); var PH=Math.round(PW/0.66);
    if(PH>availH){PH=Math.round(availH);PW=Math.round(PH*0.66);}
    return {PW:Math.round(PW),PH:PH,portrait:portrait};
  }
  function ind(cur){curIndex=cur;indEl.textContent=(cur+1)+' / '+totalFlip;}

  function paginate(s){
    var pr=document.createElement('div'); pr.className='pg';
    pr.style.cssText='position:absolute;left:-9999px;top:0;width:'+s.PW+'px;height:'+s.PH+'px';
    document.body.appendChild(pr);
    function fits(){return pr.scrollHeight<=pr.clientHeight-18;}
    var pages=[]; chapters=[];
    function flush(){pages.push(pr.innerHTML);pr.innerHTML='';}
    var it=BOOK.items;
    for(var i=0;i<it.length;i++){
      var o=it[i];
      if(o.t==='h1'){
        if(pr.innerHTML.trim()) flush();
        chapters.push({title:o.x,page:pages.length});
        var h=document.createElement('div');h.className='rh1';h.textContent=o.x;pr.appendChild(h);continue;
      }
      if(o.t==='h2'){
        var h2=document.createElement('div');h2.className='rh2';h2.textContent=o.x;pr.appendChild(h2);
        if(!fits()){pr.removeChild(h2);if(pr.innerHTML.trim())flush();pr.appendChild(h2);}
        else if(pr.clientHeight-pr.scrollHeight<52){pr.removeChild(h2);flush();pr.appendChild(h2);}
        continue;
      }
      var p=document.createElement('div');p.className='rp';p.textContent=o.x;pr.appendChild(p);
      if(fits())continue;
      pr.removeChild(p);
      var words=o.x.split(' '),cp=document.createElement('div');cp.className='rp';pr.appendChild(cp);var buf=[];
      for(var w=0;w<words.length;w++){
        buf.push(words[w]);cp.textContent=buf.join(' ');
        if(!fits()){
          if(buf.length>1){buf.pop();cp.textContent=buf.join(' ');w--;}
          if(buf.length===0){ /* single huge word: keep it */ buf.push(words[w]); cp.textContent=words[w]; }
          flush();cp=document.createElement('div');cp.className='rp cont';pr.appendChild(cp);buf=[];
        }
      }
    }
    if(pr.innerHTML.replace(/<div class="rp cont"><\/div>/g,'').trim())flush();
    document.body.removeChild(pr);
    return pages;
  }
  function makePages(s,pages){
    var els=[];
    function pd(inner,hard){var d=document.createElement('div');d.className='page'+(hard?' --hard':'');d.style.width=s.PW+'px';d.style.height=s.PH+'px';if(hard)d.setAttribute('data-density','hard');d.innerHTML=inner;return d;}
    els.push(pd('<div class="cover"><img src="'+BOOK.cover+'" alt=""></div>',true));
    for(var i=0;i<pages.length;i++) els.push(pd('<div class="pg">'+pages[i]+'<div class="pn">'+(i+1)+'</div></div>',false));
    els.push(pd('<div class="backc"><div class="bc-mark">&#10086;</div><div class="bc-t">Hearts On Fire</div><div class="bc-s">heartsonfiretv.com</div></div>',true));
    return els;
  }
  function buildToc(){
    tocList.innerHTML='';
    chapters.forEach(function(c){
      var a=document.createElement('a');var fp=c.page+1;
      a.innerHTML=c.title+'<span>'+(c.page+1)+'</span>';
      a.onclick=function(){if(api)api.goto(fp);tocEl.classList.remove('open');};
      tocList.appendChild(a);
    });
  }
  function desktopFlip(s,els){
    bookEl.style.cssText=''; bookEl.innerHTML='';
    els.forEach(function(e){bookEl.appendChild(e);});
    if(typeof St==='undefined'||!St.PageFlip){return mobileReader(s,els);}
    try{
      flip=new St.PageFlip(bookEl,{width:s.PW,height:s.PH,size:'fixed',showCover:true,usePortrait:false,autoSize:false,maxShadowOpacity:.5,drawShadow:true,flippingTime:680,mobileScrollSupport:false});
      flip.loadFromHTML(bookEl.querySelectorAll('.page'));
      totalFlip=flip.getPageCount(); ind(0);
      flip.on('flip',function(e){ind(e.data);});
      api={next:function(){flip.flipNext();},prev:function(){flip.flipPrev();},goto:function(p){flip.flip(p);},jump:function(p){try{flip.turnToPage(p);}catch(e){flip.flip(p);}}};
    }catch(err){mobileReader(s,els);}
  }
  function mobileReader(s,els){
    bookEl.style.cssText=''; bookEl.innerHTML='';
    var view=document.createElement('div'); view.className='mview'; view.style.width=s.PW+'px'; view.style.height=s.PH+'px';
    var track=document.createElement('div'); track.className='mtrack';
    els.forEach(function(e){e.style.flex='0 0 '+s.PW+'px';e.style.width=s.PW+'px';track.appendChild(e);});
    view.appendChild(track); bookEl.appendChild(view);
    var idx=0; totalFlip=els.length;
    function show(i){idx=Math.max(0,Math.min(els.length-1,i));track.style.transform='translateX(-'+(idx*s.PW)+'px)';ind(idx);}
    show(0);
    api={next:function(){show(idx+1);},prev:function(){show(idx-1);},goto:function(p){show(p);},jump:function(p){var t=track.style.transition;track.style.transition='none';show(p);requestAnimationFrame(function(){track.style.transition=t;});}};
    var x0=null,y0=null;
    view.addEventListener('touchstart',function(e){x0=e.touches[0].clientX;y0=e.touches[0].clientY;},{passive:true});
    view.addEventListener('touchend',function(e){if(x0==null)return;var dx=e.changedTouches[0].clientX-x0,dy=e.changedTouches[0].clientY-y0;if(Math.abs(dx)>38&&Math.abs(dx)>Math.abs(dy))show(idx+(dx<0?1:-1));x0=null;},{passive:true});
  }
  function loadFonts(){
    if(!document.fonts||!document.fonts.load) return Promise.resolve();
    var f=['400 15px "Lora"','italic 400 15px "Lora"','500 15px "Lora"','600 17px "Playfair Display"','700 23px "Playfair Display"'];
    return Promise.all(f.map(function(x){return document.fonts.load(x).catch(function(){});}));
  }
  function go(){
    var frac=(totalFlip>1)?(curIndex/(totalFlip-1)):0;
    loadEl.classList.remove('hide');
    setTimeout(function(){
      var s=size(); var pages=paginate(s); var els=makePages(s,pages);
      if(flip){try{flip.destroy();}catch(e){}flip=null;}
      if(s.portrait) mobileReader(s,els); else desktopFlip(s,els);
      buildToc();
      if(frac>0&&api&&api.jump){var tp=Math.round(frac*(totalFlip-1));if(tp>0){try{api.jump(tp);}catch(e){}}}
      setTimeout(function(){loadEl.classList.add('hide');},150);
    },40);
  }
  document.getElementById('next').onclick=function(){if(api)api.next();};
  document.getElementById('prev').onclick=function(){if(api)api.prev();};
  addEventListener('keydown',function(e){if(e.key==='ArrowRight'){if(api)api.next();}else if(e.key==='ArrowLeft'){if(api)api.prev();}});
  document.getElementById('tocBtn').onclick=function(){tocEl.classList.toggle('open');};
  document.getElementById('tocClose').onclick=function(){tocEl.classList.remove('open');};
  setTimeout(function(){var h=document.getElementById('hint');if(h)h.style.opacity='0';},6000);
  var rt;
  function refit(){loadEl.classList.remove('hide');clearTimeout(rt);rt=setTimeout(function(){loadFonts().then(go);},280);}
  addEventListener('resize',refit);
  if(window.visualViewport)visualViewport.addEventListener('resize',refit);
  loadFonts().then(go);
  setTimeout(function(){if(!api)go();},3000);
})();
</script>
